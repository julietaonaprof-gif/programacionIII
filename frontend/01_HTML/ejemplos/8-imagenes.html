<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Ejemplo de imagen</title>
</head>

<body>

  <!-- 
    La etiqueta <img> se usa para insertar imágenes en una página web.
    Es una etiqueta vacía (no tiene cierre).
  -->

  <!-- 
    src: indica la ruta o ubicación de la imagen
    alt: texto alternativo que describe la imagen (importante para accesibilidad y SEO)
  -->
  <img src="paisaje.jpg" alt="Paisaje de montañas al atardecer">

  <!-- 
    width y height permiten definir el tamaño de la imagen
    Se pueden indicar en píxeles o con CSS
  -->
  <img src="playa.jpg" alt="Playa tropical" width="300" height="200">

  <!-- 
    title: muestra un texto cuando el usuario pasa el mouse sobre la imagen
  -->
  <img src="ciudad.jpg" alt="Vista de la ciudad de noche" title="Ciudad iluminada">

  <!-- 
    Buenas prácticas:
    - Siempre usar alt
    - Optimizar el tamaño de la imagen
    - Usar rutas correctas
  -->

</body>

</html>
