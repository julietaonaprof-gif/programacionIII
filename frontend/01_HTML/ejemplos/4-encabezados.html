<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Elementos de texto en HTML</title>
</head>

<body>

  <!-- Encabezados: se usan para títulos y subtítulos.
       Van del más importante (h1) al menos importante (h6) -->

  <h1>Título principal</h1>
  <h2>Subtítulo</h2>
  <h3>Sección</h3>
  <h4>Subsección</h4>
  <h5>Título menor</h5>
  <h6>Título muy pequeño</h6>

</body>

</html>
