<!-- Indica al navegador que el documento está escrito en HTML5 -->
<!DOCTYPE html>

<!-- Es la etiqueta principal del documento HTML.
     Todo el contenido de la página debe estar dentro de ella, con lang se especifica el lenguaje de la página-->
<html lang="es">

<!-- Contiene información sobre la página que el usuario no ve directamente.
     Aquí se colocan metadatos, el título de la página, enlaces a CSS, etc. -->

<head>

  <!-- Define el título de la página.
       Este texto aparece en la pestaña del navegador -->
  <title>Nombre de la página</title>

</head>

<!-- Contiene todo el contenido visible de la página web:
     texto, imágenes, enlaces, botones, tablas, etc. -->

<body>

  <!--Aquí se escribe texto y/o se anidan otras etiquetas-->

</body>

</html>
