<!DOCTYPE html>
<html>

<head>
  <title>Elementos de bloque y en línea</title>
</head>

<body>
  <!-- 

    1️⃣ <div> es un elemento de bloque

    Ocupa todo el ancho disponible

    Siempre empieza en una nueva línea

    Empuja al siguiente elemento hacia abajo

    2️⃣ <span> es un elemento en línea (inline)

    Solo ocupa el ancho de su contenido

    No crea salto de línea

    Se coloca en la misma línea si puede 
    
  -->

  <div style="background-color: lightblue; padding:10px;">
    Elemento de bloque
  </div>

  <span style="background-color: blue; padding:10px;">
    Elemento de línea
  </span>
</body>

</html>
