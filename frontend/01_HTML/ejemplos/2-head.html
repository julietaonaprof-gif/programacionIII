<!DOCTYPE html>
<html lang="es">

<head>

  <!-- Define la codificación de caracteres (permite usar tildes, ñ, etc.) -->
  <meta charset="UTF-8">

  <!-- Hace que la web sea responsive en dispositivos móviles -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la página (se muestra en la pestaña del navegador) -->
  <title>Mi Página Web</title>

  <!-- Breve descripción de la página (importante para SEO) -->
  <meta name="description" content="Descripción de la página para buscadores">

  <!-- Palabras clave relacionadas con el contenido (menos usado hoy en día) -->
  <meta name="keywords" content="html, css, web, ejemplo">

  <!-- Autor del sitio web -->
  <meta name="author" content="Tu Nombre">

  <!-- Ícono que aparece en la pestaña del navegador -->
  <link rel="icon" href="favicon.ico">

  <!-- Favicon en formato PNG (opcional, mejor calidad) -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Color de la barra del navegador en dispositivos móviles -->
  <meta name="theme-color" content="#0b0c10">

  <!-- Título que aparece cuando compartís la página en redes sociales -->
  <meta property="og:title" content="Mi Página Web">

  <!-- Descripción para redes sociales -->
  <meta property="og:description" content="Descripción cuando se comparte">

  <!-- Imagen que se muestra al compartir -->
  <meta property="og:image" content="https://tusitio.com/imagen.jpg">

  <!-- URL oficial del sitio -->
  <meta property="og:url" content="https://tusitio.com">

  <!-- Tipo de contenido (website, article, etc.) -->
  <meta property="og:type" content="website">

  <!-- Tipo de tarjeta para Twitter -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- Título para Twitter -->
  <meta name="twitter:title" content="Mi Página Web">

  <!-- Descripción para Twitter -->
  <meta name="twitter:description" content="Descripción para Twitter">

  <!-- Imagen para Twitter -->
  <meta name="twitter:image" content="https://tusitio.com/imagen.jpg">

  <!-- Enlace a hoja de estilos CSS -->
  <link rel="stylesheet" href="estilos.css">

  <!-- Mejora la carga de fuentes externas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- Importa una fuente desde Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">

  <!-- Librería de íconos (Font Awesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- URL canónica (evita contenido duplicado en SEO) -->
  <!-- 
    https://tusitio.com/zapatillas
    https://tusitio.com/zapatillas?color=rojo
    https://tusitio.com/zapatillas?ref=instagram
    https://www.tusitio.com/zapatillas
    http://tusitio.com/zapatillas 
  -->
  <link rel="canonical" href="https://tusitio.com">

  <!-- Indica a los buscadores si deben indexar la página -->
  <!-- Problema que resuelve: no todas tus páginas deberían aparecer en Google. Páginas de login, paneles de admin, resultados de búsqueda interna, páginas de "gracias por tu compra" — no querés que se indexen.  -->

  <!-- Página normal pública (es el comportamiento por defecto, podrías no ponerlo) -->
  <meta name="robots" content="index, follow">

  <!-- Página que NO querés en Google pero sí que siga sus links -->
  <meta name="robots" content="noindex, follow">

  <!-- Página privada total: ni indexar ni seguir links -->
  <meta name="robots" content="noindex, nofollow">

</head>

<body>

  <h1>Hola mundo 🌍</h1>

</body>

</html>
